name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2 — pinned to SHA to prevent supply chain attacks
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build extension ZIP
        run: |
          mkdir -p _build
          zip -r _build/extension.zip \
            _locales/ \
            constants/ \
            content/ \
            icon/ \
            options/ \
            popup/ \
            background.js \
            manifest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            _build/extension.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
