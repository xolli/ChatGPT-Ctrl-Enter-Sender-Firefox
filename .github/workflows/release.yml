name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build XPI
        run: |
          zip -r "chatgpt-ctrl-enter-sender.xpi" . -x \
            "*.git*" \
            "*.github*" \
            "*.md" \
            ".gitignore" \
            "build.sh" \
            "package*.json" \
            "playwright.config.js" \
            "tests/*" \
            "tools/*" \
            "*.xpi" \
            "*.zip"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: chatgpt-ctrl-enter-sender.xpi
          generate_release_notes: true
