name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      # actions/setup-node v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check supported-site consistency
        run: python3 tools/check_supported_sites.py

      - name: Run deterministic tests
        run: xvfb-run --auto-servernum npm test

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # actions/checkout v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Build extension ZIP
        run: |
          mkdir -p _build
          zip -r _build/extension.zip \
            _locales/ \
            constants/ \
            content/ \
            icon/ \
            options/ \
            popup/ \
            background.js \
            manifest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            _build/extension.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
